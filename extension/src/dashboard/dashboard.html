<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Merlin AutoApply — Painel</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <header>
    <div class="brand">
      <span class="logo-dot"></span>
      <h1>Merlin AutoApply</h1>
    </div>
    <div class="header-actions">
      <label class="concurrency">
        Simultâneas:
        <input id="concurrency" type="number" min="1" max="10" value="3">
      </label>
      <button id="btn-clear-completed" class="btn-ghost">Limpar finalizadas</button>
    </div>
  </header>

  <section class="summary" id="summary">
    <div class="card" data-status="pending">
      <div class="count" id="count-pending">0</div>
      <div class="label">Pendentes</div>
    </div>
    <div class="card" data-status="running">
      <div class="count" id="count-running">0</div>
      <div class="label">Em andamento</div>
    </div>
    <div class="card attention" data-status="needs_attention">
      <div class="count" id="count-attention">0</div>
      <div class="label">Aguardando você</div>
    </div>
    <div class="card" data-status="completed">
      <div class="count" id="count-completed">0</div>
      <div class="label">Aplicadas</div>
    </div>
    <div class="card" data-status="failed">
      <div class="count" id="count-failed">0</div>
      <div class="label">Com erro</div>
    </div>
  </section>

  <section class="controls">
    <div class="input-row">
      <textarea
        id="urls-input"
        placeholder="Cole URLs de vagas do Gupy (uma por linha)&#10;Ex.: https://brisanet.gupy.io/job/abc123"
        rows="3"
      ></textarea>
      <button id="btn-add" class="btn-primary">Adicionar à fila</button>
    </div>
    <div class="run-row">
      <button id="btn-start" class="btn-primary">▶ Iniciar</button>
      <button id="btn-pause" class="btn-ghost">⏸ Pausar</button>
      <span id="run-status" class="run-status"></span>
    </div>
  </section>

  <section class="job-list">
    <div class="list-header">
      <h2>Fila do dia</h2>
    </div>
    <div id="jobs" class="jobs"></div>
    <div id="empty-state" class="empty" hidden>
      Nenhuma vaga na fila. Cole URLs acima para começar.
    </div>
  </section>

  <script src="dashboard.js"></script>
</body>
</html>
