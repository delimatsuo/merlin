# .claude/deploy-config.yaml
# Generated by /deploy-setup — consumed by /deploy
# Do not delete — /deploy relies on this file for project-specific values.

schema_version: 1

project:
  name: "merlin"
  platform: "firebase-hosting+cloud-run"
  # Frontend: Next.js static export → Firebase Hosting
  # Backend: Python FastAPI → Cloud Run (southamerica-east1)

environments:
  staging:
    branch: "staging"
    url: "pending"
    gcp_project_id: "merlin-489714"
    health_check: "/health"
    cloud_run_service: "merlin-backend"
    cloud_run_region: "southamerica-east1"
    firebase_site: "merlin-489714"
  production:
    branch: "main"
    url: "https://merlincv.com"
    gcp_project_id: "merlin-489714"
    health_check: "/health"
    cloud_run_service: "merlin-backend"
    cloud_run_region: "southamerica-east1"
    cloud_run_url: "https://merlin-backend-531233742939.southamerica-east1.run.app"
    firebase_site: "merlin-489714"

ci_cd:
  provider: "github-actions"
  deploy_workflow: ".github/workflows/deploy.yml"
  rollback_workflow: ".github/workflows/rollback.yml"
  auth_method: "not-configured"
  # Also has: backend/cloudbuild.yaml for Cloud Build (alternative)

reviewer:
  tech_stack: "Next.js 16, TypeScript, Tailwind CSS, shadcn/ui, Firebase Auth, Zustand, Python 3.12, FastAPI, Cloud Run, Firestore"
  additional_rules: ""
