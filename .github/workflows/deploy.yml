name: Deploy

on:
  push:
    branches: [staging, main]

permissions:
  id-token: write
  contents: read

env:
  GCP_PROJECT_ID: merlin-489714
  CLOUD_RUN_SERVICE: merlin-backend
  CLOUD_RUN_REGION: southamerica-east1
  CLOUD_RUN_SA: merlin-api-sa@merlin-489714.iam.gserviceaccount.com

jobs:
  # ──────────────────────────────────────────
  # Detect what changed to skip unnecessary jobs
  # ──────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      environment: ${{ steps.env.outputs.environment }}
      firebase_target: ${{ steps.env.outputs.firebase_target }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Detect changed paths
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - 'firebase.json'
              - '.firebaserc'
            backend:
              - 'backend/**'

      - name: Set environment
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "firebase_target=production" >> "$GITHUB_OUTPUT"
          else
            echo "environment=staging" >> "$GITHUB_OUTPUT"
            echo "firebase_target=staging" >> "$GITHUB_OUTPUT"
          fi

  # ──────────────────────────────────────────
  # Frontend: Build → Deploy to Firebase Hosting
  # ──────────────────────────────────────────
  deploy-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.changes.outputs.environment }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Create env file
        working-directory: frontend
        run: |
          cat > .env.local << 'ENVEOF'
          NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=merlincv.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID=merlin-489714
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=merlin-489714.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=531233742939
          NEXT_PUBLIC_FIREBASE_APP_ID=1:531233742939:web:ca00cb4179af522e689f7e
          NEXT_PUBLIC_API_URL=${{ secrets.API_URL }}
          ENVEOF

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: frontend
        run: npm run lint -- --max-warnings 10

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@ba79af03959ebeac9769e648f473a284504d9193 # v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase Hosting
        run: |
          npm install -g firebase-tools
          firebase deploy \
            --only hosting:${{ needs.changes.outputs.firebase_target }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --non-interactive

  # ──────────────────────────────────────────
  # Backend: Build Docker → Deploy to Cloud Run
  # ──────────────────────────────────────────
  deploy-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.changes.outputs.environment }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@ba79af03959ebeac9769e648f473a284504d9193 # v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@77e7a554d41e2ee56fc945c52dfd3f33d12def9a # v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.CLOUD_RUN_REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        working-directory: backend
        run: |
          IMAGE="${{ env.CLOUD_RUN_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/merlin/${{ env.CLOUD_RUN_SERVICE }}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image "${{ env.IMAGE }}" \
            --project ${{ env.GCP_PROJECT_ID }} \
            --region ${{ env.CLOUD_RUN_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --service-account ${{ env.CLOUD_RUN_SA }} \
            --memory 2Gi \
            --cpu 1 \
            --concurrency 40 \
            --max-instances 10 \
            --min-instances 0 \
            --timeout 300 \
            --quiet

      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --region ${{ env.CLOUD_RUN_REGION }} \
            --format 'value(status.url)')
          echo "Deployed to: $URL"
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${URL}/health" || echo "N/A")
          echo "Health check: HTTP $STATUS"
          if [[ "$STATUS" != "200" ]]; then
            echo "::warning::Health check returned $STATUS"
          fi
