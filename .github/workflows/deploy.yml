name: Deploy

on:
  push:
    branches: [staging, main]

permissions:
  id-token: write
  contents: read

env:
  GCP_PROJECT_ID: merlin-489714
  CLOUD_RUN_SERVICE: merlin-backend
  CLOUD_RUN_REGION: southamerica-east1
  FIREBASE_SITE: merlin-489714

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Create env file
        working-directory: frontend
        run: |
          cat > .env.local << 'EOF'
          NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=merlin-489714.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID=merlin-489714
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=merlin-489714.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=531233742939
          NEXT_PUBLIC_FIREBASE_APP_ID=1:531233742939:web:ca00cb4179af522e689f7e
          NEXT_PUBLIC_API_URL=${{ secrets.API_URL }}
          EOF

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: frontend-build
          path: frontend/out

  build-backend:
