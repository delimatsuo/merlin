name: Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to rollback'
        required: true
        type: choice
        options: [staging, production]
      target:
        description: 'What to rollback'
        required: true
        type: choice
        options: [frontend, backend, both]
      revision_or_tag:
        description: 'Cloud Run revision name (backend) or git tag (frontend)'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  GCP_PROJECT_ID: merlin-489714
  CLOUD_RUN_SERVICE: merlin-backend
  CLOUD_RUN_REGION: southamerica-east1

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: ${{ inputs.revision_or_tag }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@ba79af03959ebeac9769e648f473a284504d9193 # v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@77e7a554d41e2ee56fc945c52dfd3f33d12def9a # v2

      - name: Rollback Cloud Run (traffic split)
        if: inputs.target == 'backend' || inputs.target == 'both'
        run: |
          echo "Rolling back Cloud Run to revision: ${{ inputs.revision_or_tag }}"
          gcloud run services update-traffic ${{ env.CLOUD_RUN_SERVICE }} \
            --to-revisions=${{ inputs.revision_or_tag }}=100 \
            --region ${{ env.CLOUD_RUN_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }}

      - name: Rollback Firebase Hosting (redeploy from tag)
        if: inputs.target == 'frontend' || inputs.target == 'both'
        run: |
          FIREBASE_TARGET="production"
          if [[ "${{ inputs.environment }}" == "staging" ]]; then
            FIREBASE_TARGET="staging"
          fi
          echo "Redeploying Firebase Hosting ($FIREBASE_TARGET) from tag: ${{ inputs.revision_or_tag }}"

          # Setup Node and build from the tagged commit
          npm install -g firebase-tools
          cd frontend
          npm ci
          cat > .env.local << 'ENVEOF'
          NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=merlincv.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID=merlin-489714
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=merlin-489714.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=531233742939
          NEXT_PUBLIC_FIREBASE_APP_ID=1:531233742939:web:ca00cb4179af522e689f7e
          NEXT_PUBLIC_API_URL=${{ secrets.API_URL }}
          ENVEOF
          npm run build
          cd ..
          firebase deploy --only hosting:$FIREBASE_TARGET --project ${{ env.GCP_PROJECT_ID }} --non-interactive

      - name: Report
        run: |
          echo "============================================"
          echo "ROLLBACK COMPLETE"
          echo "============================================"
          echo "Environment: ${{ inputs.environment }}"
          echo "Target:      ${{ inputs.target }}"
          echo "Revision/Tag: ${{ inputs.revision_or_tag }}"
          echo "============================================"
